<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>
    <link rel="shortcut icon" href="./assets/github-logo.png" type="image/png">

        <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" /> 

    <!-- Font intergration -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">

  <!-- Tailwind+DaisyUI -->
     <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Stylesheet -->
    <link rel="stylesheet" href="./style.css">
    
</head>

    <body class="bg-gray-100 flex justify-center items-center min-h-screen">
  <div class="w-full max-w-sm p-8 space-y-4 bg-white shadow-lg rounded-lg">
    <div class="text-center">
      <img src="./assets/github-logo.png" alt="GitHub" class="mx-auto h-12 w-12">
      <h2 class="text-2xl font-semibold text-gray-700 mt-4">GitHub Issues Tracker</h2>
      <p class="text-gray-500 text-sm">Sign in to manage your issues</p>
    </div>

    <form id="loginForm">
      <div class="space-y-4">
        <div>
          <label for="username" class="block text-sm font-medium text-gray-700">Username</label>
          <input type="text" id="username" name="username" class="input input-bordered w-full mt-1" placeholder="Enter Username" value="admin" />
        </div>

        <div>
          <label for="password" class="block text-sm font-medium text-gray-700">Password</label>
          <input type="password" id="password" name="password" class="input input-bordered w-full mt-1" placeholder="Enter Password" value="admin123" />
        </div>

        <button onclick="window.location.href='./home.html'" id="login-btn"
          class="btn btn-primary w-full bg-indigo-600 border-none hover:bg-indigo-700 text-white shadow-md">
          Sign In
        </button>
      </div>
    </form>

    <div class="text-center mt-4 text-sm text-gray-500">
      <p>Demo Credentials:</p>
      <p><strong>Username:</strong> admin</p>
      <p><strong>Password:</strong> admin123</p>
    </div>
  </div>


    <!-- <script src="./script.js"></script> -->
    <script src="./signin.js"></script>
</body>
</html>
