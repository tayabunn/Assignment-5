<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>
    <link rel="shortcut icon" href="./assets/github-logo.png" type="image/png">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" /> 

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <style>
        body { font-family: 'Poppins', sans-serif; }
    </style>
</head>

<body class="bg-[#f1f1f1] min-h-screen">
  <nav class="bg-white p-4 shadow-md">
    <div class="flex items-center justify-between max-w-7xl mx-auto">
      <div class="flex items-center space-x-2">
        <img src="./assets/github-logo.png" alt="GitHub" class="h-6">
        <span class="text-xl font-semibold">GitHub Issues Tracker</span>
      </div>

      <div class="flex items-center space-x-4">
        <div class="relative w-full max-w-xs">
          <input type="text" id="searchInput" placeholder="Search issues..." 
            class="border px-4 py-2 pl-10 rounded-md text-sm text-gray-600 focus:outline-none focus:ring-2 focus:ring-blue-400 w-full">
          <i class="fa-solid fa-magnifying-glass absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-500"></i>
        </div>
        <button class="btn btn-primary">+ New Issue</button>
      </div>
    </div>
  </nav>

  <section id="tab" class="max-w-7xl mx-auto mt-6 px-4">
    <div class="bg-white shadow-md rounded-lg p-6">
      <button onclick="switchTab('all')" id="all-tab" class="btn btn-primary w-30">All</button>
      <button onclick="switchTab('open')" id="open-tab" class="btn btn-outline w-30 ml-1">Open</button>
      <button onclick="switchTab('closed')" id="closed-tab" class="btn btn-outline w-30 ml-1">Closed</button>
    </div>
  </section>

  <section class="max-w-7xl mx-auto mt-6 px-4">
    <div class="bg-white shadow-md rounded-lg p-6 border border-gray-100">
      <div class="flex flex-col gap-4 sm:flex-row sm:items-center sm:justify-between">
        <div class="flex items-center gap-4">
          <img src="./assets/aperture.png" alt="Logo" class="h-8 w-8">
          <div>
            <p id="totalCount" class="text-lg font-semibold text-gray-700">0 Issues</p>
            <p class="text-sm text-gray-500">Track and manage your project issues</p>
          </div>
        </div>
        <div class="flex items-center gap-6">
          <div class="flex items-center gap-2">
            <span class="h-2 w-2 rounded-full bg-emerald-500"></span>
            <span class="text-sm font-semibold text-gray-700">Open</span>
          </div>
          <div class="flex items-center gap-2">
            <span class="h-2 w-2 rounded-full bg-violet-500"></span>
            <span class="text-sm font-semibold text-gray-700">Closed</span>
          </div>
        </div>
      </div>
    </div>

    <div id="issues-container" class="mt-6 grid gap-6 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 pb-10"></div>
  </section>

  <dialog id="issue_details_modal" class="modal modal-bottom sm:modal-middle">
    <div class="modal-box max-w-2xl p-0 overflow-hidden">
      <div id="modalHeaderStrip" class="h-2 w-full"></div>
      <div class="p-8">
        <div class="flex items-center gap-3 mb-4">
          <span id="modalStatus" class="text-white text-[10px] font-bold px-3 py-1 rounded-full uppercase"></span>
          <span class="text-gray-400 text-xs italic">Opened by <span id="modalAuthor" class="font-medium text-gray-600"></span> • <span id="modalDate"></span></span>
        </div>
        <h2 id="modalTitle" class="text-2xl font-bold text-gray-800 mb-4"></h2>
        <div id="modalLabels" class="flex gap-2 mb-6"></div>
        <p id="modalDescription" class="text-gray-500 leading-relaxed mb-8"></p>
        
        <div class="bg-gray-50 rounded-xl p-6 grid grid-cols-2 gap-8">
          <div>
            <span class="text-[10px] uppercase text-gray-400 font-bold tracking-wider block mb-2">Assignee:</span>
            <span id="modalAssignee" class="font-bold text-gray-800"></span>
          </div>
          <div>
            <span class="text-[10px] uppercase text-gray-400 font-bold tracking-wider block mb-2">Priority:</span>
            <span id="modalPriority" class="text-white text-[10px] px-3 py-1 rounded font-bold inline-block"></span>
          </div>
        </div>
        <div class="modal-action">
          <form method="dialog">
            <button class="btn btn-primary px-8">Close</button>
          </form>
        </div>
      </div>
    </div>
  </dialog>

  <script src="./home.js"></script>
  <script src="./script.js"></script>
</body>
</html>
