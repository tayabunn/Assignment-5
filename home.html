<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>
    <link rel="shortcut icon" href="./assets/github-logo.png" type="image/png">

        <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" /> 

    <!-- Font intergration -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">

  <!-- Tailwind+DaisyUI -->
     <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Stylesheet -->
    <link rel="stylesheet" href="./style.css">
    
</head>

<body class="bg-[#f1f1f1] min-h-screen">
  <nav class="bg-white p-4 shadow-md">
    <div class="flex items-center justify-between max-w-11/12 mx-auto">
      <!-- Logo Section -->
      <div class="flex items-center space-x-2">
        <img src="./assets/github-logo.png" alt="GitHub" class="h-6">
        <span class="text-xl font-semibold">GitHub Issues Tracker</span>
      </div>

      <!-- Search and New Issue Section -->
       <div class="flex items-center space-x-4">
    <div class="relative w-full max-w-xs">
      <!-- Search input with FontAwesome magnifying glass icon -->
      <input
        type="text" 
        id="searchInput"
        placeholder="Search issues..."
        class="border px-4 py-2 pl-10 rounded-md text-sm text-gray-600 focus:outline-none focus:ring-2 focus:ring-blue-400 w-full"
      >
      <!-- Font Awesome magnifying glass icon inside the input field -->
      <i class="fa-solid fa-magnifying-glass absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-500"></i>
    </div>

        <button class="btn btn-primary">+ New Issue</button>
      </div>
    </div>
  </nav>

  <section id="tab" class="max-w-9/12 mx-auto mt-6">
    <div class="bg-white shadow-md rounded-lg p-6">
      <button onclick="switchTab('all')" id="all-tab"
       class="btn btn-primary active w-30 ">All</button>
       
       <button onclick="switchTab('open')" id="open-tab"
       class="btn btn-xs sm:btn-sm md:btn-md lg:btn-lg xl:btn-md w-30 ml-1">Open</button>
       <button onclick="switchTab('closed')" id="closed-tab"
       class="btn btn-xs sm:btn-sm md:btn-md lg:btn-lg xl:btn-md w-30 ml-1">Closed</button>
    </div>
  </section>

  
 <section class="max-w-9/12 mx-auto mt-6">
  <div class="bg-white shadow-md rounded-lg p-6">
    <div class="flex flex-col gap-4 sm:flex-row sm:items-center sm:justify-between">
      <div class="flex items-center gap-4">
        <img src="./assets/aperture.png" alt="Aperture Logo" class="h-8 w-8">
        <div>
          <p class="text-lg font-semibold text-gray-700">50 Issues</p>
          <p class="text-sm text-gray-500">Track and manage your project issues</p>
        </div>
      </div>

      <div class="flex items-center gap-6">
        <div class="flex items-center gap-2">
          <span class="h-2 w-2 rounded-full bg-emerald-500"></span>
          <span class="text-sm font-semibold text-gray-700">Open</span>
        </div>
        <div class="flex items-center gap-2">
          <span class="h-2 w-2 rounded-full bg-violet-500"></span>
          <span class="text-sm font-semibold text-gray-700">Closed</span>
        </div>
      </div>
    </div>

    <!-- Card section start -->
    <div id="issues-container" class="mt-6 grid gap-6 sm:grid-cols-2 xl:grid-cols-4">
        <div class="group relative rounded-xl border border-gray-200 bg-white p-6 shadow-sm hover:shadow-md transition">
        <div class="absolute inset-x-0 top-0 h-1 rounded-t-xl bg-emerald-400"></div>
        <div class="flex items-center justify-between">
          <span class="w-7 h-7 bg-green-100 rounded-full flex items-center justify-center text-green-600">
          <img src="./assets/circle.png" alt="circle" class="h-5 w-5">
          </span>
          <span class="rounded-full bg-rose-100 px-3 py-1 text-xs font-semibold text-rose-700">
            HIGH
          </span>
        </div>
        <h3 class="mt-4 text-base font-semibold text-gray-900">Fix navigation menu on mobile devices</h3>
        <p class="mt-2 text-sm text-gray-500">The navigation menu doesn't collapse properly on mobile devices...</p>
         <div class="badge badge-outline bg-red-100 border-red-500 border py-3 mt-3 font-medium text-[#EF4444]"><img src="./assets/bug.png" alt="bug" class="font-bold"> BUG</div>
      <div class="badge badge-outline bg-yellow-100 border-amber-500 border py-3 mt-3 font-medium text-[#D97706]"><img src="./assets/help-wanted.png" alt="help wanted" class="font-bold"> HELP WANTED</div>
        <div class="mt-4 flex items-center justify-between text-xs text-gray-500">
          <span>#1 by john_doe</span>
          <span>1/15/2024</span>
        </div>
      </div>

    
    </div>
  </div>
</section>



  <script src="./script.js"></script>
  <script src="./home.js"></script>
</body>
</html>
